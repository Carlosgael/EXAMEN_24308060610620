{% extends 'base.html' %}
{% block title %}Iniciar sesión{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">

    <div class="card shadow border-0">
      <div class="card-body p-4">

        <h2 class="text-center mb-4 fw-bold">Iniciar sesión</h2>

        <form method="POST">

          <div class="mb-3">
            <label>Email</label>
            <input type="email" name="email" class="form-control" required autocomplete="username">
          </div>

          <div class="mb-3">
            <label>Contraseña</label>
            <input type="password" name="password" class="form-control" required autocomplete="current-password">
          </div>

          <button class="btn btn-primary w-100 fw-bold">Entrar</button>

        </form>

        <div class="mt-3 text-center">
          <a href="{{ url_for('register') }}">Crear cuenta</a> ·
          <a href="{{ url_for('forgot_password') }}">Recuperar contraseña</a>
        </div>

      </div>
    </div>

  </div>
</div>
{% endblock %}
